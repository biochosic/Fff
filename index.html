<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навчальний Тренажер 3000</title>
    <style>
        :root {
            --primary: #4834d4; --secondary: #22a6b3; --bg: #f0f2f5;
            --text: #130f40; --white: #ffffff; --success: #6ab04c;
            --danger: #eb4d4b; --warning: #f1c40f; --gray: #95afc0;
        }

        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container {
            width: 95%; max-width: 650px; background: var(--white); padding: 2.5rem;
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            position: relative; text-align: center; overflow: hidden;
        }

        .hidden { display: none !important; }

        /* Меню */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .btn-role { padding: 40px 20px; border: none; border-radius: 20px; font-size: 1.5rem; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; box-shadow: 0 8px 0 rgba(0,0,0,0.1); }
        .btn-parents { background: var(--primary); }
        .btn-child { background: var(--secondary); }
        .btn-role:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

        /* Батьківська панель */
        textarea { width: 100%; height: 250px; padding: 15px; border: 2px solid #edf2f7; border-radius: 15px; font-size: 1rem; margin: 15px 0; resize: none; background: #fcfcfc; }
        
        /* Тест */
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .q-display { font-size: 3rem; font-weight: 800; margin: 50px 0; color: var(--primary); letter-spacing: -1px; }
        .ans-input { width: 100%; padding: 20px; font-size: 1.8rem; border: 3px solid #f0f2f5; border-radius: 18px; text-align: center; outline: none; transition: 0.3s; background: #fdfdfd; }
        .ans-input:focus { border-color: var(--secondary); background: white; }

        /* КАРТКА РЕЗУЛЬТАТІВ */
        .result-card { border-radius: 25px; padding: 30px; margin-top: 10px; transition: all 0.5s ease; }
        .res-perfect { background: #e3f9e5; border: 2px solid var(--success); }
        .res-good { background: #fff9db; border: 2px solid var(--warning); }
        .res-bad { background: #fff5f5; border: 2px solid var(--danger); }

        .grade-circle {
            width: 120px; height: 120px; border-radius: 50%; background: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; font-weight: 900; margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .stat-item { background: rgba(255,255,255,0.6); padding: 15px; border-radius: 15px; }
        .stat-label { font-size: 0.8rem; color: #718096; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-value { font-size: 1.4rem; font-weight: 700; }

        /* Загальні кнопки */
        .btn { padding: 15px 30px; border: none; border-radius: 15px; cursor: pointer; font-weight: 700; font-size: 1rem; transition: 0.2s; }
        .btn-confirm { background: var(--success); color: white; width: 100%; }
        .btn-exit { background: var(--danger); color: white; padding: 8px 15px; font-size: 0.8rem; }
        .btn-clear { background: #eee; color: var(--danger); margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <div id="section-menu">
            <h1 style="font-size: 2.2rem; margin-bottom: 10px;">Привіт! 👋</h1>
            <p id="q-remaining-main" style="color: var(--gray); font-weight: 500;">Залишилось питань: 0</p>
            <div class="grid-menu">
                <button class="btn-role btn-parents" onclick="showSection('section-parents')">БАЬКИ</button>
                <button class="btn-role btn-child" onclick="initTest()">ДИТИНА</button>
            </div>
        </div>

        <div id="section-parents" class="hidden">
            <h2 style="margin-top: 0;">Налаштування питань</h2>
            <p style="font-size: 0.9rem; color: var(--gray);">Додайте до 3000 питань у форматі: <b>2+2=4</b></p>
            <textarea id="bulk-input" placeholder="Вставте ваші приклади сюди..."></textarea>
            <button class="btn btn-confirm" onclick="saveQuestions()">ЗБЕРЕГТИ ТА ПОВЕРНУТИСЬ</button>
            <button class="btn btn-clear" onclick="clearAll()">ОЧИСТИТИ ВСЮ БАЗУ</button>
            <p><button class="btn" style="background: transparent; color: var(--gray);" onclick="showSection('section-menu')">Скасувати</button></p>
        </div>

        <div id="section-test" class="hidden">
            <div class="q-header">
                <div id="q-counter" style="font-weight: 600; color: var(--secondary);">Питань у черзі: 0</div>
                <button class="btn btn-exit" onclick="endSession()">ЗАВЕРШИТИ ЗАРАЗ</button>
            </div>
            <div id="q-text" class="q-display">---</div>
            <input type="number" id="user-ans" class="ans-input" placeholder="?" autocomplete="off">
            <button class="btn btn-confirm" style="background: var(--secondary); margin-top: 30px;" onclick="handleAnswer()">ВІДПОВІСТИ →</button>
        </div>

        <div id="section-results" class="hidden">
            <div id="result-wrapper" class="result-card">
                <h2 id="res-title" style="margin-top: 0;">Результати сесії</h2>
                <div class="grade-circle" id="res-grade">0</div>
                <div id="res-comment" style="font-weight: 600; margin-bottom: 10px;">Молодець!</div>
                
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-label">Правильно</div>
                        <div class="stat-value" id="res-correct" style="color: var(--success);">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Помилки</div>
                        <div class="stat-value" id="res-wrong" style="color: var(--danger);">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Всього спроб</div>
                        <div class="stat-value" id="res-total">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Точність</div>
                        <div class="stat-value" id="res-accuracy" style="color: var(--primary);">0%</div>
                    </div>
                </div>
                
                <button class="btn btn-confirm" style="background: var(--primary);" onclick="showSection('section-menu')">НА ГОЛОВНУ</button>
            </div>
        </div>
    </div>

    <script>
        let db = []; 
        let sessionCorrect = 0;
        let sessionWrong = 0;
        let sessionTotal = 0;

        window.onload = () => {
            const saved = localStorage.getItem('massive_db');
            if (saved) db = JSON.parse(saved);
            updateCounters();
        };

        function showSection(id) {
            document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            updateCounters();
        }

        function updateCounters() {
            const count = db.length;
            document.getElementById('q-remaining-main').innerText = `Залишилось питань у базі: ${count}`;
            document.getElementById('q-counter').innerText = `Питань у черзі: ${count}`;
        }

        // --- БАТЬКИ ---
        function saveQuestions() {
            const input = document.getElementById('bulk-input').value.trim();
            if (!input) return showSection('section-menu');

            const newQs = input.split('\n')
                .filter(l => l.includes('='))
                .slice(0, 3000)
                .map(l => {
                    const p = l.split('=');
                    return { q: p[0].trim(), a: p[1].trim().toLowerCase() };
                });

            db = [...db, ...newQs];
            localStorage.setItem('massive_db', JSON.stringify(db));
            document.getElementById('bulk-input').value = '';
            showSection('section-menu');
        }

        function clearAll() {
            if (confirm("Видалити всі питання назавжди?")) {
                db = [];
                localStorage.removeItem('massive_db');
                updateCounters();
                showSection('section-menu');
            }
        }

        // --- ДИТИНА ---
        function initTest() {
            if (db.length === 0) return alert("Питання закінчилися! Попроси батьків додати нові.");
            sessionCorrect = 0; sessionWrong = 0; sessionTotal = 0;
            showSection('section-test');
            renderNext();
        }

        function renderNext() {
            if (db.length === 0) return endSession();
            document.getElementById('q-text').innerText = db[0].q;
            document.getElementById('user-ans').value = '';
            document.getElementById('user-ans').focus();
        }

        function handleAnswer() {
            const val = document.getElementById('user-ans').value.trim().toLowerCase();
            if (!val) return;

            sessionTotal++;
            if (val === db[0].a) sessionCorrect++;
            else sessionWrong++;

            // Видалення питання (Consumption Logic)
            db.shift();
            localStorage.setItem('massive_db', JSON.stringify(db));

            if (db.length > 0) {
                updateCounters();
                renderNext();
            } else {
                endSession();
            }
        }

        // --- РЕЗУЛЬТАТИ ---
        function endSession() {
            if (sessionTotal === 0) return showSection('section-menu');

            showSection('section-results');
            
            const accuracy = Math.round((sessionCorrect / sessionTotal) * 100);
            const grade = Math.round((sessionCorrect / sessionTotal) * 12);
            
            // Заповнення даних
            document.getElementById('res-grade').innerText = grade;
            document.getElementById('res-correct').innerText = sessionCorrect;
            document.getElementById('res-wrong').innerText = sessionWrong;
            document.getElementById('res-total').innerText = sessionTotal;
            document.getElementById('res-accuracy').innerText = accuracy + '%';

            // Стилізація картки
            const wrapper = document.getElementById('result-wrapper');
            const comment = document.getElementById('res-comment');
            const gradeCircle = document.querySelector('.grade-circle');

            wrapper.className = 'result-card'; // Скидання
            if (accuracy >= 80) {
                wrapper.classList.add('res-perfect');
                comment.innerText = "Неймовірно! Ти супер-мозок! 🌟";
                gradeCircle.style.color = 'var(--success)';
            } else if (accuracy >= 50) {
                wrapper.classList.add('res-good');
                comment.innerText = "Гарний результат! Продовжуй в тому ж дусі! 👍";
                gradeCircle.style.color = 'var(--warning)';
            } else {
                wrapper.classList.add('res-bad');
                comment.innerText = "Не засмучуйся! Тренування зроблять тебе сильнішим! 💪";
                gradeCircle.style.color = 'var(--danger)';
            }
        }

        // Enter key
        document.getElementById('user-ans').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAnswer();
        });
    </script>
</body>
</html>
