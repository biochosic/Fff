<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max History Trainer</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3594/3594021.png">

    <style>
        :root {
            --primary: #4834d4; --secondary: #22a6b3; --bg: #f0f2f5;
            --text: #130f40; --white: #ffffff; --success: #6ab04c;
            --danger: #eb4d4b; --warning: #f1c40f; --gray: #95afc0;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            width: 100%; max-width: 650px; background: var(--white); padding: 2.5rem;
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            position: relative; text-align: center;
        }

        .hidden { display: none !important; }

        /* Іконка історії */
        .history-trigger {
            position: absolute; top: 20px; left: 20px;
            font-size: 1.5rem; cursor: pointer; background: #eee;
            width: 45px; height: 45px; display: flex; align-items: center;
            justify-content: center; border-radius: 12px; transition: 0.3s;
            z-index: 10;
        }
        .history-trigger:active { transform: scale(0.9); }

        /* Модальне вікно історії */
        #history-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center;
            align-items: center; z-index: 100; backdrop-filter: blur(4px);
        }
        .history-content {
            background: white; width: 90%; max-width: 500px; max-height: 80vh;
            border-radius: 20px; padding: 20px; overflow-y: auto; position: relative;
        }
        .history-card {
            background: #f8f9fa; border-left: 5px solid var(--primary);
            padding: 12px; margin-bottom: 10px; border-radius: 8px;
            text-align: left; font-size: 0.9rem; display: grid;
            grid-template-columns: 1fr 1fr; gap: 5px;
        }
        .history-card .date { grid-column: span 2; font-weight: bold; color: var(--gray); border-bottom: 1px solid #eee; margin-bottom: 5px; }
        .history-card b { color: var(--primary); }

        /* Кнопки та інтерфейс (ТВІЙ ОРИГІНАЛЬНИЙ ДИЗАЙН) */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .btn-role { padding: 40px 20px; border: none; border-radius: 20px; font-size: 1.5rem; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-parents { background: var(--primary); }
        .btn-child { background: var(--secondary); }

        textarea { width: 100%; height: 200px; padding: 15px; border: 2px solid #edf2f7; border-radius: 15px; margin: 15px 0; resize: none; font-size: 1rem; }
        .ans-input { width: 100%; padding: 18px; font-size: 1.8rem; border: 3px solid #f0f2f5; border-radius: 18px; text-align: center; outline: none; margin: 20px 0; }

        .result-card { border-radius: 25px; padding: 30px; border: 2px solid #eee; }
        .res-perfect { background: #e3f9e5; border-color: var(--success); }
        .res-good { background: #fff9db; border-color: var(--warning); }
        .res-bad { background: #fff5f5; border-color: var(--danger); }

        .btn { padding: 15px 25px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-confirm { background: var(--success); color: white; width: 100%; }
        .btn-danger { background: var(--danger); color: white; margin-top: 10px; }

        @media (max-width: 450px) {
            .grid-menu { grid-template-columns: 1fr; }
            .container { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="history-btn" class="history-trigger" onclick="toggleHistory(true)">🕒</div>

        <div id="section-menu">
            <h1>Тренажер знань 🧠</h1>
            <p id="q-remaining-main" style="color: var(--gray);">Залишилось питань: 0</p>
            <div class="grid-menu">
                <button class="btn-role btn-parents" onclick="showSection('section-parents')">БАТЬКИ</button>
                <button class="btn-role btn-child" onclick="initTest()">ДИТИНА</button>
            </div>
        </div>

        <div id="section-parents" class="hidden">
            <h2>Налаштування</h2>
            <textarea id="bulk-input" placeholder="2+2=4&#10;Столиця України = Київ"></textarea>
            <button class="btn btn-confirm" onclick="saveQuestions()">ЗБЕРЕГТИ ПИТАННЯ</button>
            <button class="btn btn-danger" style="width:100%; opacity: 0.7;" onclick="clearAll()">ОЧИСТИТИ ВСЮ БАЗУ</button>
            <p><button class="btn" style="background:none; color: var(--gray);" onclick="showSection('section-menu')">Назад</button></p>
        </div>

        <div id="section-test" class="hidden">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span id="q-counter" style="color: var(--secondary); font-weight: bold;">Питань: 0</span>
                <button class="btn btn-danger" style="padding: 8px 15px;" onclick="endSession()">ЗАВЕРШИТИ</button>
            </div>
            <div id="q-text" style="font-size: 2.2rem; font-weight: 800; margin: 40px 0; min-height: 80px;">---</div>
            <input type="text" id="user-ans" class="ans-input" placeholder="Відповідь..." autocomplete="off">
            <button class="btn btn-confirm" style="background: var(--secondary);" onclick="handleAnswer()">ВІДПОВІСТИ →</button>
        </div>

        <div id="section-results" class="hidden">
            <div id="result-wrapper" class="result-card">
                <h2 id="res-title">Підсумок</h2>
                <div id="res-grade" style="font-size: 4rem; font-weight: 900;">0</div>
                <div id="res-stats" style="margin: 20px 0; line-height: 1.6;"></div>
                <button class="btn btn-confirm" style="background: var(--primary);" onclick="showSection('section-menu')">НА ГОЛОВНУ</button>
            </div>
        </div>
    </div>

    <div id="history-modal" class="hidden">
        <div class="history-content">
            <h2 style="margin-top:0">Історія успіхів</h2>
            <div id="history-list"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn btn-danger" style="flex:1" onclick="clearHistory()">Очистити історію</button>
                <button class="btn" style="flex:1; background: #eee;" onclick="toggleHistory(false)">Закрити</button>
            </div>
        </div>
    </div>

    <script>
        let db = []; 
        let historyLog = []; 
        let session = { correct: 0, wrong: 0, total: 0 };
        let activeQs = []; // Питання для поточного тесту

        window.onload = () => {
            db = JSON.parse(localStorage.getItem('massive_db') || '[]');
            historyLog = JSON.parse(localStorage.getItem('history_log') || '[]');
            updateCounters();
        };

        function showSection(id) {
            document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('history-btn').classList.toggle('hidden', id !== 'section-menu');
        }

        function updateCounters() {
            document.getElementById('q-remaining-main').innerText = `Питань у базі: ${db.length}`;
        }

        function toggleHistory(show) {
            const modal = document.getElementById('history-modal');
            if (show) {
                renderHistory();
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = historyLog.length === 0 ? '<p style="color:var(--gray)">Історія порожня</p>' : '';
            [...historyLog].reverse().forEach(entry => {
                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <div class="date">${entry.date}</div>
                    <div>Бал: <b>${entry.grade}</b></div>
                    <div>Точність: <b>${entry.accuracy}%</b></div>
                    <div>✅ Вірно: ${entry.correct}</div>
                    <div>❌ Помилки: ${entry.wrong}</div>
                `;
                list.appendChild(card);
            });
        }

        function saveQuestions() {
            const input = document.getElementById('bulk-input').value.trim();
            if (!input) return showSection('section-menu');
            const newQs = input.split('\n').filter(l => l.includes('=')).map(l => {
                const p = l.split('=');
                return { q: p[0].trim(), a: p[1].trim().toLowerCase() };
            });
            db = [...db, ...newQs];
            localStorage.setItem('massive_db', JSON.stringify(db));
            document.getElementById('bulk-input').value = '';
            updateCounters();
            showSection('section-menu');
        }

        function initTest() {
            if (db.length === 0) return alert("Спочатку додайте питання!");
            activeQs = [...db]; // Копіюємо базу для тесту
            session = { correct: 0, wrong: 0, total: 0 };
            showSection('section-test');
            renderNext();
        }

        function renderNext() {
            if (activeQs.length === 0) return endSession();
            document.getElementById('q-counter').innerText = `Залишилось: ${activeQs.length}`;
            document.getElementById('q-text').innerText = activeQs[0].q;
            document.getElementById('user-ans').value = '';
            document.getElementById('user-ans').focus();
        }

        function handleAnswer() {
            const val = document.getElementById('user-ans').value.trim().toLowerCase();
            if (!val) return;
            session.total++;
            if (val === activeQs[0].a) session.correct++;
            else session.wrong++;
            activeQs.shift();
            renderNext();
        }

        function endSession() {
            if (session.total === 0) return showSection('section-menu');
            const accuracy = Math.round((session.correct / session.total) * 100);
            const grade = Math.round((session.correct / session.total) * 12);
            
            const now = new Date();
            historyLog.push({
                date: now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                grade, accuracy, correct: session.correct, wrong: session.wrong
            });
            localStorage.setItem('history_log', JSON.stringify(historyLog));

            showSection('section-results');
            document.getElementById('res-grade').innerText = grade;
            document.getElementById('res-stats').innerHTML = `✅ Вірно: ${session.correct} | ❌ Помилки: ${session.wrong}<br>Точність: ${accuracy}%`;
            const wrapper = document.getElementById('result-wrapper');
            wrapper.className = 'result-card ' + (accuracy >= 80 ? 'res-perfect' : accuracy >= 50 ? 'res-good' : 'res-bad');
        }

        function clearAll() {
            if (confirm("Видалити всі питання?")) {
                db = []; localStorage.removeItem('massive_db');
                updateCounters(); showSection('section-menu');
            }
        }

        function clearHistory() {
            if (confirm("Очистити історію?")) {
                historyLog = []; localStorage.removeItem('history_log');
                renderHistory();
            }
        }

        document.getElementById('user-ans').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAnswer(); });
    </script>
</body>
</html>
