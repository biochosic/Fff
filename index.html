<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навчальний Тренажер 2.0</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --bg: #f8faff;
            --text: #2d3436;
            --white: #ffffff;
            --success: #00b894;
            --danger: #ff7675;
            --warning: #fdcb6e;
        }

        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 650px;
            background: var(--white);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.1);
            text-align: center;
            position: relative;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hidden { display: none !important; }

        /* Шапка з кнопкою виходу для тесту */
        .test-header {
            position: absolute;
            top: 20px;
            right: 20px;
            left: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Кнопки */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-exit {
            background: var(--danger);
            color: white;
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .btn-big {
            padding: 50px 20px;
            border-radius: 20px;
            font-size: 1.6rem;
            color: white;
            width: 100%;
        }

        .btn-parents { background: var(--primary); box-shadow: 0 8px 0 #5b4bc4; }
        .btn-child { background: var(--secondary); box-shadow: 0 8px 0 #00b3af; }
        
        .btn-big:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }

        .btn-save { background: var(--success); color: white; width: 100%; margin-top: 10px; }

        /* Панель Батьків */
        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #e0e6ed;
            margin: 15px 0;
            font-size: 1rem;
            resize: none;
        }

        .close-icon {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #b2bec3;
        }

        /* Панель Дитини */
        .question-text {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 40px 0 20px;
            color: var(--primary);
        }

        .input-answer {
            width: 100%;
            padding: 18px;
            font-size: 1.5rem;
            border: 3px solid #eee;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-answer:focus { border-color: var(--secondary); }

        /* Результати */
        .grade-circle {
            width: 120px;
            height: 120px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0 auto 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 12px;
        }

        .empty-msg { color: var(--danger); font-weight: 600; margin-bottom: 20px; }

    </style>
</head>
<body>

    <div class="container">
        <div id="main-menu">
            <h1 style="margin-bottom: 40px;">Обери режим</h1>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <button class="btn btn-big btn-parents" onclick="showSection('parent-panel')">Батьки</button>
                <button class="btn btn-big btn-child" onclick="startTest()">Дитина</button>
            </div>
        </div>

        <div id="parent-panel" class="hidden">
            <span class="close-icon" onclick="showSection('main-menu')">&times;</span>
            <h2>Налаштування завдань</h2>
            <p style="font-size: 0.9rem; color: #636e72;">Введіть питання та відповіді через "=". Кожне завдання з нового рядка.</p>
            <textarea id="questions-input" placeholder="2 + 2 = 4&#10;10 - 3 = 7&#10;Яка планета третя від Сонця? = Земля"></textarea>
            <div id="validation-msg" style="color: var(--danger); font-size: 0.8rem; margin-bottom: 10px;"></div>
            <button class="btn btn-save" onclick="saveToStorage()">Зберегти питання</button>
        </div>

        <div id="test-panel" class="hidden">
            <div class="test-header">
                <span id="progress-text" style="font-weight: bold; color: #636e72;">1 / 10</span>
                <button class="btn btn-exit" onclick="finishTestEarly()">Завершити зараз</button>
            </div>
            <div class="question-text" id="display-question">---</div>
            <input type="text" id="answer-input" class="input-answer" placeholder="Відповідь..." autocomplete="off">
            <button class="btn btn-save" style="background: var(--secondary);" onclick="submitAnswer()">Далі →</button>
        </div>

        <div id="empty-panel" class="hidden">
            <div class="empty-msg">Батьки ще не додали завдання!</div>
            <button class="btn btn-parents" style="color:white" onclick="showSection('parent-panel')">Зайти як батьки</button>
            <button class="btn" onclick="showSection('main-menu')">Назад</button>
        </div>

        <div id="result-panel" class="hidden">
            <h2 id="result-title">Тест завершено!</h2>
            <div class="grade-circle" id="res-grade">0</div>
            <p>твоя оцінка (з 12 балів)</p>
            
            <div class="stats">
                <div class="stat-card">
                    <div style="font-size: 0.8rem; color: #636e72;">Правильно</div>
                    <div id="res-correct" style="font-size: 1.2rem; font-weight: bold; color: var(--success);">0</div>
                </div>
                <div class="stat-card">
                    <div style="font-size: 0.8rem; color: #636e72;">Всього спроб</div>
                    <div id="res-total" style="font-size: 1.2rem; font-weight: bold;">0</div>
                </div>
            </div>
            <div class="stat-card" style="margin-bottom: 20px;">
                <div style="font-size: 0.8rem; color: #636e72;">Точність</div>
                <div id="res-accuracy" style="font-size: 1.2rem; font-weight: bold; color: var(--primary);">0%</div>
            </div>

            <button class="btn btn-parents" style="color:white; width: 100%;" onclick="showSection('main-menu')">На головну</button>
        </div>
    </div>

    <script>
        let questions = [];
        let currentIndex = 0;
        let correctAnswers = 0;
        let attemptedCount = 0;

        // Завантаження при старті
        window.onload = () => {
            const saved = localStorage.getItem('school_questions');
            if (saved) {
                questions = JSON.parse(saved);
                document.getElementById('questions-input').value = questions
                    .map(q => `${q.q} = ${q.a}`)
                    .join('\n');
            }
        };

        function showSection(id) {
            document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // ПАНЕЛЬ БАТЬКІВ: Збереження
        function saveToStorage() {
            const text = document.getElementById('questions-input').value.trim();
            const validation = document.getElementById('validation-msg');
            
            if (!text) {
                validation.innerText = "Введіть хоча б одне питання!";
                return;
            }

            const lines = text.split('\n').filter(line => line.includes('='));
            
            if (lines.length > 100) {
                validation.innerText = "Максимум 100 питань! Ви ввели " + lines.length;
                return;
            }

            questions = lines.map(line => {
                const [q, a] = line.split('=');
                return { q: q.trim(), a: a.trim().toLowerCase() };
            });

            localStorage.setItem('school_questions', JSON.stringify(questions));
            validation.innerText = "";
            alert("Збережено успішно!");
            showSection('main-menu');
        }

        // РЕЖИМ ДИТИНИ: Початок
        function startTest() {
            if (questions.length === 0) {
                showSection('empty-panel');
                return;
            }
            
            currentIndex = 0;
            correctAnswers = 0;
            attemptedCount = 0;
            showSection('test-panel');
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${questions.length}`;
            document.getElementById('display-question').innerText = questions[currentIndex].q;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }

        function submitAnswer() {
            const userAns = document.getElementById('answer-input').value.trim().toLowerCase();
            
            attemptedCount++;
            if (userAns === questions[currentIndex].a) {
                correctAnswers++;
            }

            currentIndex++;

            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        // Переривання тесту
        function finishTestEarly() {
            if (attemptedCount === 0) {
                showSection('main-menu');
                return;
            }
            showResults(true);
        }

        // РЕЗУЛЬТАТИ
        function showResults(isEarly = false) {
            showSection('result-panel');
            
            const totalToCalculate = attemptedCount; 
            const accuracy = totalToCalculate > 0 ? Math.round((correctAnswers / totalToCalculate) * 100) : 0;
            
            // Оцінка за 12-бальною шкалою
            // Якщо завершено раніше, оцінюємо тільки розв'язані
            const grade = totalToCalculate > 0 ? Math.round((correctAnswers / totalToCalculate) * 12) : 0;

            document.getElementById('result-title').innerText = isEarly ? "Тест перервано" : "Чудова робота!";
            document.getElementById('res-grade').innerText = grade;
            document.getElementById('res-correct').innerText = correctAnswers;
            document.getElementById('res-total').innerText = attemptedCount;
            document.getElementById('res-accuracy').innerText = accuracy + '%';
        }

        // Підтримка клавіші Enter
        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitAnswer();
        });
    </script>
</body>
</html>
