<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навчальний Тренажер: Максимум</title>
    <style>
        :root {
            --primary: #4834d4; --secondary: #22a6b3; --bg: #f0f2f5;
            --text: #130f40; --white: #ffffff; --success: #6ab04c;
            --danger: #eb4d4b; --gray: #95afc0;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container {
            width: 95%; max-width: 700px; background: var(--white); padding: 2rem;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; text-align: center;
        }

        .hidden { display: none !important; }

        /* Меню */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .btn-role { padding: 40px 20px; border: none; border-radius: 15px; font-size: 1.5rem; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-parents { background: var(--primary); }
        .btn-child { background: var(--secondary); }
        .btn-role:hover { filter: brightness(1.1); transform: translateY(-3px); }

        /* Батьківська панель */
        textarea { width: 100%; height: 250px; padding: 15px; border: 2px solid #dff9fb; border-radius: 10px; font-size: 1rem; margin: 15px 0; resize: vertical; }
        .counter-info { font-size: 0.9rem; color: var(--gray); margin-bottom: 10px; }

        /* Тест */
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .q-display { font-size: 2.5rem; font-weight: 800; margin: 40px 0; color: var(--primary); }
        .ans-input { width: 100%; padding: 15px; font-size: 1.5rem; border: 3px solid #f0f2f5; border-radius: 12px; text-align: center; outline: none; transition: 0.3s; }
        .ans-input:focus { border-color: var(--secondary); }

        /* Кнопки */
        .btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 1rem; }
        .btn-save { background: var(--success); color: white; width: 100%; margin-top: 10px; }
        .btn-clear { background: var(--danger); color: white; margin-top: 20px; opacity: 0.8; }
        .btn-exit { background: var(--danger); color: white; }

        /* Статистика */
        .stat-box { background: #f9f9f9; padding: 20px; border-radius: 15px; margin: 20px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .big-grade { font-size: 4rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="section-menu">
            <h1>Привіт! 👋</h1>
            <p id="q-remaining-main">Залишилось питань у базі: 0</p>
            <div class="grid-menu">
                <button class="btn-role btn-parents" onclick="showSection('section-parents')">Батьки</button>
                <button class="btn-role btn-child" onclick="initTest()">Дитина</button>
            </div>
        </div>

        <div id="section-parents" class="hidden">
            <h2>Налаштування (до 3000 питань)</h2>
            <div class="counter-info">Формат: Питання = Відповідь (кожен приклад з нового рядка)</div>
            <textarea id="bulk-input" placeholder="2+2=4&#10;5*5=25..."></textarea>
            <button class="btn btn-save" onclick="saveQuestions()">Зберегти та повернутись</button>
            <button class="btn btn-clear" onclick="clearAll()">Очистити все та скинути тест</button>
            <p><button class="btn" style="background: var(--gray); color: white;" onclick="showSection('section-menu')">Назад</button></p>
        </div>

        <div id="section-test" class="hidden">
            <div class="q-header">
                <span id="q-counter" style="color: var(--gray);">Залишилось: 0</span>
                <button class="btn btn-exit" onclick="endSession()">Завершити зараз</button>
            </div>
            <div id="q-text" class="q-display">---</div>
            <input type="text" id="user-ans" class="ans-input" placeholder="Відповідь..." autocomplete="off">
            <button class="btn btn-save" style="background: var(--secondary); margin-top: 20px;" onclick="handleAnswer()">Далі →</button>
        </div>

        <div id="section-results" class="hidden">
            <h2>Результати сесії</h2>
            <div class="big-grade" id="res-grade">0</div>
            <p>балів (за 12-бальною системою)</p>
            <div class="stat-box">
                <div>Вірно: <b id="res-correct" style="color: var(--success);">0</b></div>
                <div>Всього спроб: <b id="res-total">0</b></div>
                <div style="grid-column: span 2;">Точність: <b id="res-accuracy">0%</b></div>
            </div>
            <button class="btn btn-save" style="background: var(--primary);" onclick="showSection('section-menu')">На головну</button>
        </div>
    </div>

    <script>
        let db = []; // Поточний список доступних питань
        let sessionCorrect = 0;
        let sessionTotal = 0;

        // Завантаження даних при запуску
        window.onload = () => {
            const saved = localStorage.getItem('massive_db');
            if (saved) {
                db = JSON.parse(saved);
            }
            updateMainCounter();
        };

        function showSection(id) {
            document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            updateMainCounter();
        }

        function updateMainCounter() {
            const txt = `Залишилось питань у базі: ${db.length}`;
            document.getElementById('q-remaining-main').innerText = txt;
            document.getElementById('q-counter').innerText = txt;
        }

        // --- ЛОГІКА БАТЬКІВ ---
        function saveQuestions() {
            const input = document.getElementById('bulk-input').value.trim();
            if (!input) return showSection('section-menu');

            // Обробка великого списку (до 3000)
            const newQuestions = input.split('\n')
                .filter(line => line.includes('='))
                .slice(0, 3000)
                .map(line => {
                    const parts = line.split('=');
                    return { q: parts[0].trim(), a: parts[1].trim().toLowerCase() };
                });

            // Додаємо нові питання до тих, що вже є
            db = [...db, ...newQuestions];
            localStorage.setItem('massive_db', JSON.stringify(db));
            
            alert(`Додано ${newQuestions.length} питань!`);
            document.getElementById('bulk-input').value = '';
            showSection('section-menu');
        }

        function clearAll() {
            if (confirm("Видалити всі питання та історію?")) {
                db = [];
                localStorage.removeItem('massive_db');
                document.getElementById('bulk-input').value = '';
                updateMainCounter();
                alert("Базу очищено!");
            }
        }

        // --- ЛОГІКА ДИТИНИ ---
        function initTest() {
            if (db.length === 0) {
                alert("Батьки ще не завантажили нові питання!");
                return;
            }
            sessionCorrect = 0;
            sessionTotal = 0;
            showSection('section-test');
            nextQuestion();
        }

        function nextQuestion() {
            if (db.length === 0) {
                endSession();
                return;
            }
            // Беремо перше питання зі списку
            const current = db[0];
            document.getElementById('q-text').innerText = current.q;
            document.getElementById('user-ans').value = '';
            document.getElementById('user-ans').focus();
        }

        function handleAnswer() {
            const userAns = document.getElementById('user-ans').value.trim().toLowerCase();
            if (!userAns) return;

            sessionTotal++;
            if (userAns === db[0].a) {
                sessionCorrect++;
            }

            // Видаляємо пройдене питання з масиву (Consumption Logic)
            db.shift(); 
            
            // Оновлюємо сховище відразу після кожної відповіді
            localStorage.setItem('massive_db', JSON.stringify(db));

            if (db.length > 0) {
                updateMainCounter();
                nextQuestion();
            } else {
                endSession();
            }
        }

        function endSession() {
            if (sessionTotal === 0) {
                showSection('section-menu');
                return;
            }

            showSection('section-results');
            
            const accuracy = (sessionCorrect / sessionTotal);
            const grade = Math.round(accuracy * 12);

            document.getElementById('res-grade').innerText = grade;
            document.getElementById('res-correct').innerText = sessionCorrect;
            document.getElementById('res-total').innerText = sessionTotal;
            document.getElementById('res-accuracy').innerText = Math.round(accuracy * 100) + '%';
        }

        // Enter key support
        document.getElementById('user-ans').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAnswer();
        });
    </script>
</body>
</html>
