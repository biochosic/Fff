<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max History Trainer</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4834d4">

    <style>
        :root {
            --primary: #4834d4; --secondary: #22a6b3; --bg: #f0f2f5;
            --text: #130f40; --white: #ffffff; --success: #6ab04c;
            --danger: #eb4d4b; --warning: #f1c40f; --gray: #95afc0;
        }

        * { 
            box-sizing: border-box; 
            /* Використовуємо системні шрифти, щоб вони працювали БЕЗ інтернету */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            width: 100%; max-width: 650px; background: var(--white); padding: 2rem;
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            position: relative; text-align: center;
        }

        .hidden { display: none !important; }

        /* Іконка історії */
        .history-trigger {
            position: absolute; top: 15px; left: 15px;
            font-size: 1.5rem; cursor: pointer; background: #eee;
            width: 40px; height: 40px; display: flex; align-items: center;
            justify-content: center; border-radius: 12px; transition: 0.3s;
            z-index: 10;
        }

        /* Модальне вікно історії */
        #history-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center;
            align-items: center; z-index: 100; backdrop-filter: blur(5px);
        }
        .history-content {
            background: white; width: 90%; max-width: 500px; max-height: 80vh;
            border-radius: 20px; padding: 20px; overflow-y: auto; position: relative;
        }
        .history-card {
            background: #f8f9fa; border-left: 5px solid var(--primary);
            padding: 12px; margin-bottom: 10px; border-radius: 8px;
            text-align: left; font-size: 0.9rem; display: grid;
            grid-template-columns: 1fr 1fr; gap: 5px;
        }
        .history-card .date { grid-column: span 2; font-weight: bold; color: var(--gray); border-bottom: 1px solid #eee; margin-bottom: 5px; }
        .history-card b { color: var(--primary); }

        /* Кнопки та інтерфейс */
        .grid-menu { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 30px; }
        @media (min-width: 400px) { .grid-menu { grid-template-columns: 1fr 1fr; } }

        .btn-role { padding: 30px 15px; border: none; border-radius: 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-parents { background: var(--primary); }
        .btn-child { background: var(--secondary); }

        textarea { width: 100%; height: 150px; padding: 15px; border: 2px solid #edf2f7; border-radius: 15px; margin: 15px 0; font-size: 1rem; }
        .ans-input { width: 100%; padding: 15px; font-size: 1.5rem; border: 3px solid #f0f2f5; border-radius: 15px; text-align: center; outline: none; margin: 15px 0; }

        .result-card { border-radius: 25px; padding: 20px; border: 2px solid #eee; }
        .res-perfect { background: #e3f9e5; border-color: var(--success); }
        .res-good { background: #fff9db; border-color: var(--warning); }
        .res-bad { background: #fff5f5; border-color: var(--danger); }

        .btn { padding: 15px 20px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; font-size: 1rem; }
        .btn-confirm { background: var(--success); color: white; width: 100%; }
        .btn-danger { background: var(--danger); color: white; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="history-btn" class="history-trigger" onclick="toggleHistory(true)">🕒</div>

        <div id="section-menu">
            <h1 style="font-size: 1.8rem; margin-bottom: 5px;">Max History 🧠</h1>
            <p id="q-remaining-main" style="color: var(--gray); margin-top: 0;">Питань у базі: 0</p>
            <div class="grid-menu">
                <button class="btn-role btn-parents" onclick="showSection('section-parents')">БАТЬКИ</button>
                <button class="btn-role btn-child" onclick="initTest()">ДИТИНА</button>
            </div>
        </div>

        <div id="section-parents" class="hidden">
            <h2>Налаштування</h2>
            <p style="font-size: 0.8rem; color: var(--gray);">Формат: Питання = Відповідь (кожна пара з нового рядка)</p>
            <textarea id="bulk-input" placeholder="2+2=4&#10;Київ=Україна"></textarea>
            <button class="btn btn-confirm" onclick="saveQuestions()">ЗБЕРЕГТИ ПИТАННЯ</button>
            <button class="btn btn-danger" style="width:100%; opacity: 0.7;" onclick="clearAll()">ОЧИСТИТИ ВСЕ</button>
            <p><button class="btn" style="background:none; color: var(--gray);" onclick="showSection('section-menu')">← Назад</button></p>
        </div>

        <div id="section-test" class="hidden">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <span id="q-counter" style="color: var(--secondary); font-weight: bold;">0</span>
                <button class="btn btn-danger" style="padding: 5px 10px; font-size: 0.8rem;" onclick="endSession()">ВИЙТИ</button>
            </div>
            <div id="q-text" style="font-size: 1.8rem; font-weight: 800; margin: 30px 0; min-height: 60px;">---</div>
            <input type="text" id="user-ans" class="ans-input" placeholder="Відповідь..." autocomplete="off">
            <button class="btn btn-confirm" style="background: var(--secondary);" onclick="handleAnswer()">ВІДПОВІСТИ</button>
        </div>

        <div id="section-results" class="hidden">
            <div id="result-wrapper" class="result-card">
                <h2 id="res-title">Твій результат:</h2>
                <div id="res-grade" style="font-size: 3.5rem; font-weight: 900;">0</div>
                <div id="res-stats" style="margin: 15px 0; font-size: 1rem;"></div>
                <button class="btn btn-confirm" style="background: var(--primary);" onclick="showSection('section-menu')">ГОТОВО</button>
            </div>
        </div>
    </div>

    <div id="history-modal" class="hidden">
        <div class="history-content">
            <h2 style="margin-top:0">Минулі спроби</h2>
            <div id="history-list"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn btn-danger" style="flex:1" onclick="clearHistory()">Видалити</button>
                <button class="btn" style="flex:1; background: #eee;" onclick="toggleHistory(false)">Закрити</button>
            </div>
        </div>
    </div>

    <script>
        let db = []; 
        let historyLog = []; 
        let session = { correct: 0, wrong: 0, total: 0 };
        let currentQuestions = [];

        window.onload = () => {
            // Завантаження даних з пам'яті телефону
            db = JSON.parse(localStorage.getItem('massive_db') || '[]');
            historyLog = JSON.parse(localStorage.getItem('history_log') || '[]');
            updateCounters();
        };

        function showSection(id) {
            document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            // Ховаємо іконку історії в налаштуваннях
            document.getElementById('history-btn').classList.toggle('hidden', id !== 'section-menu');
        }

        function updateCounters() {
            document.getElementById('q-remaining-main').innerText = `Питань у базі: ${db.length}`;
        }

        function toggleHistory(show) {
            const modal = document.getElementById('history-modal');
            if (show) {
                renderHistory();
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = historyLog.length === 0 ? '<p>Ще немає результатів</p>' : '';
            [...historyLog].reverse().slice(0, 10).forEach(entry => {
                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <div class="date">${entry.date}</div>
                    <div>Бал: <b>${entry.grade}/12</b></div>
                    <div>Точність: <b>${entry.accuracy}%</b></div>
                `;
                list.appendChild(card);
            });
        }

        function saveQuestions() {
            const input = document.getElementById('bulk-input').value.trim();
            if (!input) return showSection('section-menu');
            const lines = input.split('\n');
            const newQs = lines.map(l => {
                if (l.includes('=')) {
                    const parts = l.split('=');
                    return { q: parts[0].trim(), a: parts[1].trim().toLowerCase() };
                }
                return null;
            }).filter(item => item !== null);

            db = [...db, ...newQs];
            localStorage.setItem('massive_db', JSON.stringify(db));
            document.getElementById('bulk-input').value = '';
            updateCounters();
            showSection('section-menu');
        }

        function initTest() {
            if (db.length === 0) {
                alert("Спочатку додайте питання у розділі 'Батьки'!");
                return;
            }
            // Копіюємо базу для поточної сесії, щоб не видаляти основну базу
            currentQuestions = [...db]; 
            session = { correct: 0, wrong: 0, total: 0 };
            showSection('section-test');
            renderNext();
        }

        function renderNext() {
            if (currentQuestions.length === 0) return endSession();
            document.getElementById('q-counter').innerText = `Залишилось: ${currentQuestions.length}`;
            document.getElementById('q-text').innerText = currentQuestions[0].q;
            document.getElementById('user-ans').value = '';
            document.getElementById('user-ans').focus();
        }

        function handleAnswer() {
            const val = document.getElementById('user-ans').value.trim().toLowerCase();
            if (!val) return;

            session.total++;
            if (val === currentQuestions[0].a) {
                session.correct++;
            } else {
                session.wrong++;
            }

            currentQuestions.shift();
            renderNext();
        }

        function endSession() {
            if (session.total === 0) return showSection('section-menu');
            
            const accuracy = Math.round((session.correct / session.total) * 100);
            const grade = Math.round((session.correct / session.total) * 12);
            
            // Збереження історії
            const now = new Date();
            historyLog.push({
                date: now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                grade, accuracy
            });
            localStorage.setItem('history_log', JSON.stringify(historyLog));

            // Показ результату
            showSection('section-results');
            document.getElementById('res-grade').innerText = grade;
            document.getElementById('res-stats').innerHTML = `Вірно: ${session.correct} | Помилок: ${session.wrong}<br>Точність: ${accuracy}%`;
            
            const wrapper = document.getElementById('result-wrapper');
            wrapper.className = 'result-card ' + (grade >= 10 ? 'res-perfect' : grade >= 7 ? 'res-good' : 'res-bad');
        }

        function clearAll() {
            if (confirm("Видалити всі питання з бази?")) {
                db = [];
                localStorage.removeItem('massive_db');
                updateCounters();
                showSection('section-menu');
            }
        }

        function clearHistory() {
            if (confirm("Очистити історію?")) {
                historyLog = [];
                localStorage.removeItem('history_log');
                renderHistory();
            }
        }

        // Кнопка Enter на клавіатурі
        document.getElementById('user-ans').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAnswer();
        });
    </script>
</body>
</html>
